<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NiKo Tears Timeline</title>
  <meta
    name="description"
    content="A bilingual Chinese and English timeline of NiKo's Major heartbreaks, honors, and Counter-Strike legacy."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;500;700;900&family=Work+Sans:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="./assets/site.css">
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="#top" aria-label="NiKo Tears Timeline">
        <span class="brand-mark">18</span>
        <span class="brand-copy">
          <strong>NiKo Tears Timeline</strong>
          <small id="brand-subline"></small>
        </span>
      </a>
      <div class="lang-switch" role="group" aria-label="Language switcher">
        <button type="button" class="lang-btn is-active" data-lang-btn="zh">中文</button>
        <button type="button" class="lang-btn" data-lang-btn="en">EN</button>
      </div>
    </header>

    <main id="top">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow" id="hero-eyebrow"></p>
          <h1 id="hero-title"></h1>
          <p class="hero-subtitle" id="hero-subtitle"></p>
          <p class="hero-tagline" id="hero-tagline"></p>
          <div class="hero-actions">
            <a class="hero-link" href="#timeline" id="hero-primary"></a>
            <a class="hero-link muted" href="#legacy" id="hero-secondary"></a>
          </div>
        </div>
        <aside class="hero-panel" aria-label="Snapshot">
          <div class="hero-watermark">NIKO</div>
          <div class="panel-head">
            <span class="panel-kicker" id="panel-kicker"></span>
            <span class="panel-year">2015-2026</span>
          </div>
          <div class="stat-grid" id="stat-grid"></div>
          <div class="panel-note" id="panel-note"></div>
        </aside>
      </section>

      <section class="section-head">
        <p class="section-kicker" id="timeline-kicker"></p>
        <h2 id="timeline-title"></h2>
        <p class="section-intro" id="timeline-intro"></p>
      </section>

      <section class="timeline" id="timeline" aria-live="polite"></section>

      <section class="legacy" id="legacy">
        <div class="section-head legacy-head">
          <p class="section-kicker" id="legacy-kicker"></p>
          <h2 id="legacy-title"></h2>
          <p class="section-intro" id="legacy-intro"></p>
        </div>
        <div class="legacy-grid" id="legacy-grid"></div>
        <article class="closing-card">
          <div class="closing-kicker" id="closing-kicker"></div>
          <blockquote id="closing-quote"></blockquote>
          <div class="closing-copy" id="closing-copy"></div>
        </article>
      </section>
    </main>

    <footer class="footer">
      <p id="footer-line-1"></p>
      <p id="footer-line-2"></p>
      <p id="footer-line-3"></p>
    </footer>
  </div>

  <script src="./assets/site.js"></script>
</body>
</html>
